# mSSA Run Configurations
# ========================
# Each [runs.<name>] section defines one run.
# Required per run: data_file
# All other keys fall back to [defaults] if not specified.
#
# Usage:
#   python run.py <name>
#   python run.py <name> --no-movies

[defaults]
npc          = 50
window_frac  = 0.5
channel_name = "one-armed amplitude"
jphi_min     = 1000.0
jbins        = 26

